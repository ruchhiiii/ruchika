<!DOCTYPE html>
<html>
<head>
    <title>Marquee Image Link Example</title>
</head>
<body>

    <h2>Scrolling Image with a Link</h2>

    <!-- The entire marquee content is wrapped in an anchor <a> tag to make it a link. -->
    <!-- The <img> tag is nested inside the marquee to make the image scroll. -->
    <a href="https://srmist.codetantra.com/login.jsp">
        <marquee behavior="alternate" direction="right" scrollamount="5">
            <img src="https://images.pexels.com/photos/2388568/pexels-photo-2388568.jpeg" alt="A small dog" width="100" height="100">
        </marquee>
    </a>

    <p>The image above is a scrolling element and also a clickable link. The `marquee` tag is deprecated in HTML5, so consider using CSS animations for modern projects.</p>

</body>
</html>
